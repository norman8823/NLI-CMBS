services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: nli
      POSTGRES_PASSWORD: nli
      POSTGRES_DB: nli_cmbs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nli -d nli_cmbs"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nli:nli@postgres:5432/nli_cmbs
      EDGAR_USER_AGENT: "NLIntelligence/1.0 (contact@nlintelligence.com)"
      EDGAR_BASE_URL: https://data.sec.gov
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
